name: Run Nifty Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests ta

      - name: Run Nifty scanner
        run: |
          python scanner.py

      - name: Commit and push updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html performance_log.csv scanner_output.csv scanner_status.txt trade_log.csv || true
          git commit -m "Update Nifty scanner results" || echo "No changes to commit"
          git push
